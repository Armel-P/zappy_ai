SEED: 0

# --- environment ---
MAP_SIZE: [15, 15]
MAX_EPISODE_TICKS: 20000

# --- population ---
N_TEAMS: 2
POP_SIZE: 800             # 800 genomes choosen a random
MAX_TEAM_SIZE: 100        # in order to limit fork
TEAM_EPISODE_SIZE: 80     # Number of genome which will play each gen
REINJECT_FRAC: 0.2

# --- network ---
# state_dim computed at runtime
HIDDEN_LAYERS: [256, 128]

# --- evolution ---
N_GENERATIONS: 5000
ELITE_FRAC: 0.05          # keep top 5%
MUTATION_STD: 0.04
FORK_MUTATION_STD: 0.05

# --- training control ---
WIN_STREAK_STOP: 50       # stop if one team wins 50 consecutive episodes
CHECKPOINT_INTERVAL: 100  # save best genome every 100 generations
